<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>The Echoing Dark</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: none; }
        
        #arrow-container { width: 50px; height: 60px; position: relative; margin-bottom: 5px; }
        #arrow { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 45px solid #ddd; position: absolute; left: 50%; top: 5px; transform: translateX(-50%); }
        
        #game-container { position: relative; width: 350px; height: 350px; border: 4px solid #1a1a1a; overflow: hidden; background: #bbb; }
        canvas { display: block; width: 350px; height: 350px; image-rendering: pixelated; }
        
        #story-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 500; cursor: pointer; text-align: center; padding: 20px; }
        #story-text { color: #fff; font-size: 20px; font-weight: bold; text-shadow: 0 0 15px red; margin-bottom: 20px; }
        #warning-overlay { position: absolute; inset: 0; background: rgba(200,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 400; font-size: 45px; color: #f00; font-weight: bold; letter-spacing: 5px; animation: blink 0.3s infinite; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .shake { animation: shakeAnim 0.1s infinite; }
        @keyframes shakeAnim { 0% { transform: translate(4px, 4px); } 50% { transform: translate(-4px, -4px); } 100% { transform: translate(4px, -4px); } }

        #joystick-zone { width: 140px; height: 140px; background: rgba(255,255,255,0.05); border: 2px solid #333; border-radius: 50%; margin-top: 25px; position: relative; }
        #joystick-knob { width: 50px; height: 50px; background: #666; border-radius: 50%; position: absolute; top: 45px; left: 45px; pointer-events: none; }
        
        #overlay, #end-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .btn { background: #222; color: #fff; border: 1px solid #666; padding: 15px 40px; font-size: 20px; cursor: pointer; margin: 10px; min-width: 180px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="arrow-container"><div id="arrow"></div></div>
<div id="game-container">
    <div id="story-overlay"><div id="story-text"></div><div style="color:#fff; font-size:12px; text-decoration: underline; margin-top:10px;">TAP TO PROCEED</div></div>
    <div id="warning-overlay">WARNING</div>
    <canvas id="gameCanvas" width="350" height="350"></canvas>
</div>
<div id="joystick-zone"><div id="joystick-knob"></div></div>

<div id="overlay">
    <h1 style="letter-spacing: 8px; color: #800;">THE ECHOING DARK</h1>
    <button class="btn" id="btn-normal">NORMAL</button>
    <button class="btn" id="btn-hard" style="color:#f00;">HARD</button>
</div>

<div id="end-screen" style="display:none;">
    <div id="end-msg" style="font-size: 20px; margin-bottom:30px; color: #f00; font-weight:bold;"></div>
    <button class="btn" onclick="location.reload()">RESTART</button>
</div>

<script>
const WORLD_SIZE = 100, GRID_RES = 35;
const melodyNotes = [220.0, 233.1, 261.6, 311.1, 349.2, 415.3];
let map = [], player = {x:50.5, y:50.5, vx:0, vy:0}, greyDot = {x:0,y:0}, redDot = {x:0,y:0};
let enemies = [], gameState = 'FIND_GREY', difficulty = 'normal', isPaused = false, redFollowing = false, isGameOver = false;
let audioCtx, mainGain, noteIndex = 0;

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const arrow = document.getElementById('arrow');

/** 1. 音頻引擎 **/
function initAudio() {
    if (audioCtx) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        mainGain = audioCtx.createGain(); mainGain.connect(audioCtx.destination);
        mainGain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        playDynamic();
    } catch(e) {}
}

function playDynamic() {
    if(isGameOver) return;
    let interval = 1200;
    if (enemies.length > 0 && !isPaused) {
        let minDist = 100;
        enemies.forEach(e => {
            let d = Math.sqrt((e.x - player.x)**2 + (e.y - player.y)**2);
            if (d < minDist) minDist = d;
        });
        interval = Math.max(150, Math.min(1200, (minDist - 2) * 60 + 150));
    }
    if (!isPaused && audioCtx) {
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.type = 'triangle'; osc.frequency.value = melodyNotes[noteIndex % 6] * (gameState === 'RETURN_GREY' ? 0.4 : 1);
        g.gain.setValueAtTime(0, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
        osc.connect(g).connect(mainGain); osc.start(); osc.stop(audioCtx.currentTime + 0.6);
        noteIndex++;
    }
    setTimeout(playDynamic, interval);
}

function playSfx(f, d, vol = 0.6) {
    if(!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = 'square'; o.frequency.value = f;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + d);
    o.connect(g).connect(mainGain); o.start(); o.stop(audioCtx.currentTime + d);
}

/** 2. 啟動與地圖生成 **/
function startApp(mode) {
    difficulty = mode;
    document.getElementById('overlay').style.display = 'none';
    initAudio();
    
    // 強制重置數據
    map = Array.from({length: WORLD_SIZE}, () => Array.from({length: WORLD_SIZE}, () => Math.random() < 0.28 ? 1 : 0));
    for(let i=0; i<WORLD_SIZE; i++) map[i] = map[i] = map[i] = map[i] = 1;
    
    const clr = (cx, cy) => {
        let ix = Math.floor(cx), iy = Math.floor(cy);
        for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) if(map[iy+i]) map[iy+i][ix+j] = 0;
    };
    player = {x:50.5, y:50.5, vx:0, vy:0}; clr(player.x, player.y);
    do { greyDot.x = 10 + Math.random()*80; greyDot.y = 10 + Math.random()*80; } 
    while(Math.sqrt((greyDot.x-50.5)**2+(greyDot.y-50.5)**2) < 20 || map[Math.floor(greyDot.y)][Math.floor(greyDot.x)] === 1);
    clr(greyDot.x, greyDot.y);

    requestAnimationFrame(update);
}

/** 3. 劇情互動 **/
function triggerStory(msg, next) {
    isPaused = true; player.vx = 0; player.vy = 0;
    const ov = document.getElementById('story-overlay');
    document.getElementById('story-text').innerText = msg;
    ov.style.display = 'flex';
    playSfx(100, 1, 0.8);
    const clickOnce = () => {
        ov.style.display = 'none'; ov.removeEventListener('click', clickOnce);
        playSfx(800, 0.2, 0.5);
        if(next) next(); else isPaused = false;
    };
    ov.addEventListener('click', clickOnce);
}

function startWarning() {
    isPaused = true;
    const gc = document.getElementById('game-container'), wo = document.getElementById('warning-overlay');
    gc.classList.add('shake'); wo.style.display = 'flex';
    playSfx(60, 3, 0.9);
    setTimeout(() => {
        gc.classList.remove('shake'); wo.style.display = 'none';
        isPaused = false; 
    }, 3000);
}

/** 4. 遊戲主循環 (渲染 + 邏輯) **/
function update() {
    if(isGameOver) return;
    
    // --- 渲染部分 (放在最前確保畫面不消失) ---
    ctx.fillStyle = (difficulty === 'hard') ? "#444" : "#bbb";
    ctx.fillRect(0,0,350,350);
    
    if (map.length > 0) {
        ctx.save();
        ctx.translate(175 - player.x*GRID_RES, 175 - player.y*GRID_RES);
        
        ctx.fillStyle = "#000";
        for(let y = Math.floor(player.y-10); y <= player.y+10; y++) {
            for(let x = Math.floor(player.x-10); x <= player.x+10; x++) {
                if(y >= 0 && y < 100 && x >= 0 && x < 100 && map[y][x] === 1) {
                    ctx.fillRect(x*GRID_RES, y*GRID_RES, GRID_RES+0.5, GRID_RES+0.5);
                }
            }
        }
        ctx.fillStyle = "#888"; ctx.beginPath(); ctx.arc(greyDot.x*GRID_RES, greyDot.y*GRID_RES, 8, 0, 7); ctx.fill();
        if(gameState !== 'FIND_GREY') {
            let angle = Math.atan2(player.vy, player.vx); if(player.vx===0 && player.vy===0) angle = Math.PI;
            let rx = redFollowing ? player.x - Math.cos(angle)*0.6 : redDot.x;
            let ry = redFollowing ? player.y - Math.sin(angle)*0.6 : redDot.y;
            if(redFollowing) {
                ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5; ctx.beginPath();
                ctx.moveTo(player.x*GRID_RES, player.y*GRID_RES); ctx.lineTo(rx*GRID_RES, ry*GRID_RES); ctx.stroke();
            }
            ctx.fillStyle = "red"; ctx.beginPath(); ctx.arc(rx*GRID_RES, ry*GRID_RES, 8, 0, 7); ctx.fill();
        }
        enemies.forEach(e => {
            ctx.beginPath(); ctx.fillStyle = (difficulty==='hard') ? `rgba(204,204,0,${0.4+Math.random()*0.6})` : "#cc0";
            ctx.arc(e.x*GRID_RES, e.y*GRID_RES, 7, 0, 7); ctx.fill();
        });
        ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(player.x*GRID_RES, player.y*GRID_RES, 10, 0, 7); ctx.fill();
        ctx.restore();
    }

    // --- 邏輯部分 ---
    let target = (gameState === 'FIND_GREY' || gameState === 'RETURN_GREY') ? greyDot : redDot;
    let tdx = target.x - player.x, tdy = target.y - player.y, dist = Math.sqrt(tdx*tdx + tdy*tdy);
    let b = Math.min(220, Math.max(0, (dist - 5) * (220 / 45))); 
    arrow.style.transform = `translateX(-50%) rotate(${Math.atan2(tdy, tdx) + Math.PI/2}rad)`;
    arrow.style.borderBottomColor = `rgb(${b},${b},${b})`;

    if(!isPaused) {
        const baseSpd = 0.04;
        let curSpd = redFollowing ? baseSpd * 0.9 : baseSpd;
        let nX = player.x + player.vx * curSpd, nY = player.y + player.vy * curSpd;
        if(map[Math.floor(player.y)][Math.floor(nX + (player.vx>0?0.2:-0.2))] === 0) player.x = nX;
        if(map[Math.floor(nY + (player.vy>0?0.2:-0.2))][Math.floor(player.x)] === 0) player.y = nY;

        enemies.forEach(e => {
            let edx = player.x - e.x, edy = player.y - e.y, ed = Math.sqrt(edx*edx + edy*edy);
            if(ed < 0.45) end('You evil kidnapper!');
            let eSpd = curSpd; let evx = (edx/ed)*eSpd, evy = (edy/ed)*eSpd;
            if(map[Math.floor(e.y)][Math.floor(e.x + (evx>0?0.1:-0.1))] === 0) e.x += evx;
            if(map[Math.floor(e.y + (evy>0?0.1:-0.1))][Math.floor(e.x)] === 0) e.y += evy;
        });

        if (dist < 0.6) {
            if (gameState === 'FIND_GREY') {
                gameState = 'FIND_RED';
                triggerStory("Bring Me the Red Dot", () => {
                    let rx, ry; do { rx = 10+Math.random()*80; ry = 10+Math.random()*80; } 
                    while(Math.sqrt((rx-player.x)**2+(ry-player.y)**2) < 30 || map[Math.floor(ry)][Math.floor(rx)] === 1);
                    redDot = {x:rx, y:ry};
                });
            } else if (gameState === 'FIND_RED' && !redFollowing) {
                gameState = 'RETURN_GREY'; redFollowing = true;
                triggerStory("No…no…please no", () => {
                    startWarning();
                    enemies = []; const spawnCount = (difficulty==='hard'?25:15);
                    for(let i=0; i<spawnCount; i++){
                        let ex, ey; do { ex=5+Math.random()*90; ey=5+Math.random()*90; } 
                        while(map[Math.floor(ey)][Math.floor(ex)]===1 || Math.sqrt((ex-player.x)**2+(ey-player.y)**2) < 12);
                        enemies.push({x:ex, y:ey});
                    }
                });
            } else if (gameState === 'RETURN_GREY' && redFollowing) {
                triggerStory("Thank you. Hahaha…", () => { location.reload(); });
            }
        }
    }
    requestAnimationFrame(update);
}

function end(m) { isGameOver = true; document.getElementById('end-msg').innerText = m; document.getElementById('end-screen').style.display = 'flex'; playSfx(60, 2); }

/** 5. 搖桿交互修復 **/
const zone = document.getElementById('joystick-zone'), knob = document.getElementById('joystick-knob');
const handleMove = (e) => {
    e.preventDefault(); if(isPaused || isGameOver) return;
    const rect = zone.getBoundingClientRect();
    const t = (e.touches && e.touches[0]) ? e.touches[0] : e;
    const dx = t.clientX - (rect.left + rect.width / 2);
    const dy = t.clientY - (rect.top + rect.height / 2);
    const d = Math.min(rect.width / 2 - 10, Math.sqrt(dx*dx + dy*dy));
    const a = Math.atan2(dy, dx);
    knob.style.left = (rect.width/2 + Math.cos(a)*d - 25) + 'px';
    knob.style.top = (rect.height/2 + Math.sin(a)*d - 25) + 'px';
    player.vx = Math.cos(a)*(d/(rect.width/2));
    player.vy = Math.sin(a)*(d/(rect.width/2));
};
zone.addEventListener('touchstart', handleMove, {passive:false});
zone.addEventListener('touchmove', handleMove, {passive:false});
zone.addEventListener('touchend', () => { player.vx = 0; player.vy = 0; knob.style.left='45px'; knob.style.top='45px'; });
zone.addEventListener('mousedown', (e) => {
    const mm = (me) => handleMove(me);
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', () => { window.removeEventListener('mousemove', mm); player.vx = 0; player.vy = 0; knob.style.left='45px'; knob.style.top='45px'; }, {once:true});
});

document.getElementById('btn-normal').onclick = () => startApp('normal');
document.getElementById('btn-hard').onclick = () => startApp('hard');
</script>
</body>
</html>
