<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- 打包 App 關鍵：防止縮放與適應全螢幕 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Echoing Dark</title>
    <style>
        /* 禁止頁面彈性滾動與選取文字 */
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; touch-action: none; }
        
        #arrow-container { width: 50px; height: 60px; position: relative; margin-bottom: 5px; }
        #arrow { 
            width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; 
            border-bottom: 45px solid #333; position: absolute; left: 50%; top: 5px; transform: translateX(-50%); 
        }
        #game-container { position: relative; width: 90vw; height: 90vw; max-width: 400px; max-height: 400px; border: 4px solid #1a1a1a; overflow: hidden; background: #000; }
        canvas { display: block; width: 100%; height: 100%; }
        #subtitle { position: absolute; bottom: 15px; width: 100%; text-align: center; font-size: 14px; color: #800; font-weight: bold; text-shadow: 1px 1px 2px #000; opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 10; padding: 0 10px; box-sizing: border-box; }
        
        #joystick-zone { width: 140px; height: 140px; background: rgba(255,255,255,0.05); border: 2px solid #333; border-radius: 50%; margin-top: 20px; position: relative; }
        #joystick-knob { width: 50px; height: 50px; background: #555; border-radius: 50%; position: absolute; top: 45px; left: 45px; pointer-events: none; }
        
        #overlay, #end-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; padding: 20px; }
        #end-screen { display: none; background: rgba(30, 0, 0, 0.95); z-index: 200; }
        .btn { background: #222; color: #fff; border: 1px solid #666; padding: 15px 40px; font-size: 20px; font-family: inherit; cursor: pointer; margin: 15px; min-width: 220px; border-radius: 5px; }
        .btn:active { background: #444; }
    </style>
</head>
<body>

<div id="arrow-container"><div id="arrow"></div></div>
<div id="game-container">
    <div id="subtitle"></div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
</div>
<div id="joystick-zone"><div id="joystick-knob"></div></div>

<div id="overlay">
    <h1 style="letter-spacing: 5px; margin-bottom: 5px;">THE ECHOING DARK</h1>
    <p style="color:#666; font-size:12px; margin-bottom:20px;">Justice is coming...</p>
    <button class="btn" id="start-normal">NORMAL</button>
    <button class="btn" id="start-hard" style="color: #f00; border-color: #800;">HARD</button>
</div>

<div id="end-screen">
    <div id="end-msg" style="font-size: 18px; line-height: 1.6; margin-bottom: 30px;"></div>
    <button class="btn" onclick="location.reload()">RESTART</button>
</div>

<script>
const WORLD_SIZE = 100, GRID_RES = 40;
const melodyNotes = [220.0, 233.1, 261.6, 311.1, 349.2, 415.3];
let player, greyDot, redDot, enemies, map, gameState, redFollowing, isGameOver, audioCtx, mainGain, difficulty;
let noteIndex = 0;

/** 音頻啟動：支援 App 喚醒 **/
function startAudio() {
    try {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            mainGain = audioCtx.createGain();
            mainGain.connect(audioCtx.destination);
            mainGain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            const playLoop = () => {
                if(isGameOver) return;
                const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.value = melodyNotes[noteIndex % 6] * (gameState === 'RETURN_GREY' ? 0.4 : 1);
                g.gain.setValueAtTime(0, audioCtx.currentTime);
                g.gain.linearRampToValueAtTime(0.12, audioCtx.currentTime + 0.1);
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
                osc.connect(g).connect(mainGain);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
                noteIndex++;
                setTimeout(playLoop, difficulty === 'hard' ? 850 : 1250);
            };
            playLoop();
        } else { audioCtx.resume(); }
    } catch(e) {}
}

function playSfx(f, d) {
    if(!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.frequency.value = f;
    g.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime);
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + d);
    o.connect(g).connect(mainGain);
    o.start(); o.stop(audioCtx.currentTime + d);
}

/** 遊戲設置 **/
function setupGame(mode) {
    difficulty = mode;
    isGameOver = false; gameState = 'FIND_GREY'; redFollowing = false; 
    enemies = []; map = [];
    
    for (let y = 0; y < WORLD_SIZE; y++) {
        map[y] = [];
        for (let x = 0; x < WORLD_SIZE; x++) {
            map[y][x] = (x < 2 || x > 97 || y < 2 || y > 97 || Math.random() < 0.28) ? 1 : 0;
        }
    }

    const clearBox = (cx, cy) => {
        let ix = Math.floor(cx), iy = Math.floor(cy);
        for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) {
            if(map[iy+i]) map[iy+i][ix+j] = 0;
        }
    };

    const getSafePoint = (minDist = 0) => {
        let limit = 0;
        while(limit < 60) {
            let tx = 5 + Math.random() * 90, ty = 5 + Math.random() * 90;
            let d = player ? Math.sqrt((tx-player.x)**2+(ty-player.y)**2) : 999;
            if(map[Math.floor(ty)][Math.floor(tx)] === 0 && d >= minDist) return {x: tx, y: ty};
            limit++;
        }
        let fx = 15 + Math.random() * 70, fy = 15 + Math.random() * 70;
        clearBox(fx, fy); return {x: fx, y: fy};
    };

    player = {x: 50.5, y: 50.5, vx: 0, vy: 0}; clearBox(50, 50);
    greyDot = getSafePoint(20); clearBox(greyDot.x, greyDot.y);

    document.getElementById('overlay').style.display = 'none';
    requestAnimationFrame(gameLoop);
}

const canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
const arrow = document.getElementById('arrow'), subtitle = document.getElementById('subtitle');

function gameLoop() {
    if(isGameOver) return;
    const baseSpd = 0.055;
    let pSpd = redFollowing ? baseSpd * 0.9 : baseSpd;
    
    let nX = player.x + player.vx * pSpd, nY = player.y + player.vy * pSpd;
    if (map[Math.floor(player.y)][Math.floor(nX + (player.vx > 0 ? 0.25 : -0.25))] === 0) player.x = nX;
    if (map[Math.floor(nY + (player.vy > 0 ? 0.25 : -0.25))][Math.floor(player.x)] === 0) player.y = nY;
    
    enemies.forEach(e => {
        let dx = player.x - e.x, dy = player.y - e.y, d = Math.sqrt(dx*dx + dy*dy);
        if(d < 0.45) endGame('Justice may be delayed, but it will never be absent');
        let eSpd = pSpd; 
        let vx = (dx/d) * eSpd, vy = (dy/d) * eSpd;
        if (map[Math.floor(e.y)][Math.floor(e.x + (vx > 0 ? 0.2 : -0.2))] === 0) e.x += vx;
        else if (map[Math.floor(e.y + (vy > 0 ? 0.2 : -0.2))][Math.floor(e.x)] === 0) e.y += (dy > 0 ? eSpd : -eSpd);
        if (map[Math.floor(e.y + (vy > 0 ? 0.2 : -0.2))][Math.floor(e.x)] === 0) e.y += vy;
        else if (map[Math.floor(e.y)][Math.floor(e.x + (vx > 0 ? 0.2 : -0.2))] === 0) e.x += (dx > 0 ? eSpd : -eSpd);
    });
    
    let target = (gameState === 'FIND_GREY' || gameState === 'RETURN_GREY') ? greyDot : redDot;
    let tdx = target.x - player.x, tdy = target.y - player.y, td = Math.sqrt(tdx*tdx + tdy*tdy);
    arrow.style.transform = `translateX(-50%) rotate(${Math.atan2(tdy, tdx) + Math.PI/2}rad)`;
    let c = Math.min(180, td * 8); arrow.style.borderBottomColor = `rgb(${c},${c},${c})`;
    
    if (td < 0.6) {
        if (gameState === 'FIND_GREY') {
            gameState = 'FIND_RED';
            let rx = 10, ry = 10, limit = 0;
            while(limit < 50) {
                rx = 10 + Math.random()*80; ry = 10 + Math.random()*80;
                if(Math.sqrt((rx-greyDot.x)**2+(ry-greyDot.y)**2) > 40 && map[Math.floor(ry)][Math.floor(rx)] === 0) break;
                limit++;
            }
            redDot = {x: rx, y: ry};
            subtitle.innerText = "Help Me find the Red Dot"; subtitle.style.opacity = 1;
            playSfx(400, 0.5); setTimeout(()=>subtitle.style.opacity=0, 3000);
        } else if (gameState === 'FIND_RED' && !redFollowing) {
            gameState = 'RETURN_GREY'; redFollowing = true;
            subtitle.innerText = "No…no…please no"; subtitle.style.opacity = 1;
            playSfx(300, 0.8); setTimeout(()=>subtitle.style.opacity=0, 3000);
            for(let i=0; i<(difficulty==='hard'?25:15); i++) {
                let ex = 5+Math.random()*90, ey = 5+Math.random()*90;
                while(map[Math.floor(ey)][Math.floor(ex)] === 1) { ex = 5+Math.random()*90; ey = 5+Math.random()*90; }
                enemies.push({x:ex, y:ey});
            }
        } else if (gameState === 'RETURN_GREY' && redFollowing) { endGame("Thank you. Hahaha…"); }
    }
    render();
    requestAnimationFrame(gameLoop);
}

function render() {
    ctx.fillStyle = (difficulty === 'hard') ? "#444" : "#bbb";
    ctx.fillRect(0,0,400,400);
    ctx.save();
    ctx.translate(200 - player.x*GRID_RES, 200 - player.y*GRID_RES);
    ctx.fillStyle = "#000";
    for(let y=Math.floor(player.y-6); y<player.y+6; y++) {
        for(let x=Math.floor(player.x-6); x<player.x+6; x++) {
            if(y>=0 && y<100 && x>=0 && x<100 && map[y][x] === 1) ctx.fillRect(x*GRID_RES, y*GRID_RES, GRID_RES+0.5, GRID_RES+0.5);
        }
    }
    ctx.fillStyle = "#888"; ctx.beginPath(); ctx.arc(greyDot.x*GRID_RES, greyDot.y*GRID_RES, 8, 0, 7); ctx.fill();
    if(gameState !== 'FIND_GREY' && gameState !== 'END') {
        ctx.fillStyle = "red";
        let rx = redFollowing ? player.x + (player.vx||0)*0.7 : redDot.x;
        let ry = redFollowing ? player.y + (player.vy||0)*0.7 : redDot.y;
        ctx.beginPath(); ctx.arc(rx*GRID_RES, ry*GRID_RES, 8, 0, 7); ctx.fill();
    }
    enemies.forEach(e => {
        ctx.beginPath();
        ctx.fillStyle = (difficulty === 'hard') ? `rgba(204, 204, 0, ${0.4+Math.random()*0.6})` : "#cc0";
        ctx.arc(e.x*GRID_RES, e.y*GRID_RES, 7, 0, 7); ctx.fill();
    });
    ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(player.x*GRID_RES, player.y*GRID_RES, 10, 0, 7); ctx.fill();
    ctx.restore();
}

function endGame(msg) {
    isGameOver = true;
    document.getElementById('end-msg').innerText = msg;
    document.getElementById('end-screen').style.display = 'flex';
    playSfx(60, 2);
}

/** 控制與 App 防護機制 **/
const zone = document.getElementById('joystick-zone'), knob = document.getElementById('joystick-knob');
const handleMove = (e) => {
    e.preventDefault();
    const rect = zone.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    let dx = t.clientX - (rect.left + 70), dy = t.clientY - (rect.top + 70);
    let d = Math.min(50, Math.sqrt(dx*dx + dy*dy)), a = Math.atan2(dy, dx);
    knob.style.left = (70 + Math.cos(a)*d - 25) + 'px'; knob.style.top = (70 + Math.sin(a)*d - 25) + 'px';
    player.vx = Math.cos(a)*(d/50); player.vy = Math.sin(a)*(d/50);
};
zone.addEventListener('touchstart', handleMove, {passive:false});
zone.addEventListener('touchmove', handleMove, {passive:false});
const stopJ = () => { player.vx = 0; player.vy = 0; knob.style.left='45px'; knob.style.top='45px'; };
zone.addEventListener('touchend', stopJ);
zone.addEventListener('mousedown', (e) => {
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', () => { window.removeEventListener('mousemove', handleMove); stopJ(); }, {once:true});
});

document.getElementById('start-normal').onclick = () => { startAudio(); setupGame('normal'); };
document.getElementById('start-hard').onclick = () => { startAudio(); setupGame('hard'); };

// 當 App 從後台恢復時恢復音頻
document.addEventListener('visibilitychange', () => { if(!document.hidden && audioCtx) audioCtx.resume(); });
</script>
</body>
</html>
